<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>معالج أبشر المتكامل - نسخة مدارات</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; margin: 0; padding: 10px; touch-action: none; }
        .container { max-width: 420px; margin: auto; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h3 { color: #1e5631; margin: 5px 0; font-size: 18px; }
        
        #canvas-wrap { 
            position: relative; width: 300px; height: 400px; 
            margin: 10px auto; border: 3px solid #1e5631; 
            background: #fff; touch-action: none; overflow: hidden; border-radius: 8px;
        }
        canvas { display: block; width: 100%; height: 100%; touch-action: none; }
        
        /* طبقة الدلائل الإرشادية */
        .guide-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .grid-v { position: absolute; left: 50%; top: 0; width: 1px; height: 100%; background: rgba(30, 86, 49, 0.4); }
        .eye-line { position: absolute; top: 42%; left: 0; width: 100%; height: 1.5px; background: rgba(0, 255, 0, 0.5); }
        .shoulder-line { position: absolute; bottom: 15%; left: 10%; width: 80%; height: 60px; border: 2px solid rgba(30, 86, 49, 0.2); border-bottom: 0; border-radius: 50% 50% 0 0; }
        .face-oval { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(ellipse 110px 150px at 50% 45%, transparent 100%, rgba(255,255,255,0.75) 100%);
            border: 1px dashed rgba(30, 86, 49, 0.4);
        }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; text-align: right; }
        .control-item { display: flex; flex-direction: column; }
        label { font-size: 11px; font-weight: bold; color: #444; margin-bottom: 2px; }
        input[type="range"] { height: 20px; cursor: pointer; }
        
        .btn { grid-column: span 2; background: #1e5631; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; font-size: 16px; margin-top: 10px; cursor: pointer; }
        .btn-file { background: #e8e8e8; color: #333; grid-column: span 2; padding: 10px; margin-bottom: 5px; }
        .hint { grid-column: span 2; font-size: 10px; color: #666; background: #f9f9f9; padding: 8px; border-radius: 8px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="container">
    <h3>مُعالج الصور ابشر (سعيد مهتدى)</h3>
    
    <input type="file" id="upload" accept="image/*" style="display:none;">
    <button onclick="document.getElementById('upload').click()" class="btn btn-file">📸 اختر صورتك</button>

    <div id="canvas-wrap">
        <canvas id="canvas" width="480" height="640"></canvas>
        <div class="guide-layer">
            <div class="face-oval"></div>
            <div class="grid-v"></div>
            <div class="eye-line"></div>
            <div class="shoulder-line"></div> </div>
    </div>

    <div class="controls">
        <div class="control-item"><label>التكبير (Zoom)</label><input type="range" id="zoom" min="0.1" max="3" step="0.01" value="1"></div>
        <div class="control-item"><label>التدوير (Rotate)</label><input type="range" id="rotate" min="-20" max="20" step="0.5" value="0"></div>
        <div class="control-item"><label>السطوع (Light)</label><input type="range" id="bright" min="50" max="150" value="100"></div>
        <div class="control-item"><label>التباين (Contrast)</label><input type="range" id="contrast" min="50" max="150" value="100"></div>
        
        <div class="hint">
            • <strong>ميزان الكتفين:</strong> اجعل بداية كتفيك متساوية داخل القوس السفلي.<br>
            • <strong>التدوير:</strong> استخدمه إذا كان رأسك مائلاً قليلاً في الصورة الأصلية.
        </div>

        <button id="downloadBtn" class="btn">حفظ وتحميل الصورة ✅</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const upload = document.getElementById('upload');
    const downloadBtn = document.getElementById('downloadBtn');
    
    const sliders = ['zoom', 'bright', 'contrast', 'rotate'];
    const ctrl = {};
    sliders.forEach(s => ctrl[s] = document.getElementById(s));

    let img = new Image();
    let state = { x: 0, y: 0, scale: 1, isDragging: false, lastX: 0, lastY: 0 };

    upload.onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (f) => {
            img.onload = () => {
                state.scale = Math.max(canvas.width / img.width, canvas.height / img.height);
                state.x = canvas.width / 2;
                state.y = canvas.height / 2;
                ctrl.zoom.value = state.scale;
                draw();
            };
            img.src = f.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function draw() {
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.translate(state.x, state.y);
        ctx.rotate(ctrl.rotate.value * Math.PI / 180);
        ctx.filter = `brightness(${ctrl.bright.value}%) contrast(${ctrl.contrast.value}%)`;
        
        if (img.src) {
            ctx.drawImage(img, -img.width * state.scale / 2, -img.height * state.scale / 2, img.width * state.scale, img.height * state.scale);
        }
        ctx.restore();
    }

    sliders.forEach(s => ctrl[s].oninput = () => {
        if (s === 'zoom') state.scale = parseFloat(ctrl.zoom.value);
        draw();
    });

    const start = (e) => { state.isDragging = true; const p = e.touches ? e.touches[0] : e; state.lastX = p.clientX; state.lastY = p.clientY; };
    const move = (e) => {
        if (!state.isDragging) return;
        if (e.touches) e.preventDefault();
        const p = e.touches ? e.touches[0] : e;
        state.x += (p.clientX - state.lastX) * 1.6;
        state.y += (p.clientY - state.lastY) * 1.6;
        state.lastX = p.clientX; state.lastY = p.clientY;
        draw();
    };
    const end = () => state.isDragging = false;

    canvas.addEventListener('mousedown', start); window.addEventListener('mousemove', move); window.addEventListener('mouseup', end);
    canvas.addEventListener('touchstart', start, {passive:false}); canvas.addEventListener('touchmove', move, {passive:false}); canvas.addEventListener('touchend', end);

    downloadBtn.onclick = () => {
        const link = document.createElement('a');
        link.download = 'Absher_Ultimate.jpg';
        link.href = canvas.toDataURL('image/jpeg', 0.98);
        link.click();
    };
</script>

</body>
</html>
