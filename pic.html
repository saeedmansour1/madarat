<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>معالج صور أبشر - سعيدمهتدى</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; margin: 0; padding: 15px; touch-action: none; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h3 { margin-top:0; color:#1e5631; font-size: 18px; }
        
        #canvas-wrap { 
            position: relative; width: 300px; height: 400px; 
            margin: 15px auto; border: 2px solid #1e5631; 
            background: #fff; touch-action: none; overflow: hidden;
        }
        canvas { display: block; width: 100%; height: 100%; touch-action: none; }
        
        /* إطار الوجه المتقطع */
        .absher-guide {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            background: radial-gradient(ellipse 115px 155px at 50% 45%, transparent 100%, rgba(255,255,255,0.7) 100%);
            border: 1px dashed rgba(30, 86, 49, 0.4);
        }

        /* خط ضبط العينين الجديد */
        .eye-line {
            position: absolute;
            top: 42%; /* المستوى التقني للعينين في صور الهوية */
            left: 5%;
            width: 90%;
            height: 2px;
            background: rgba(0, 255, 0, 0.4); /* أخضر شفاف */
            pointer-events: none;
            box-shadow: 0 0 5px rgba(0,255,0,0.2);
        }

        .controls { display: flex; flex-direction: column; gap: 15px; margin-top: 10px; }
        .btn { background: #1e5631; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 16px; width: 100%; cursor: pointer; }
        .btn-file { background: #e8e8e8; color: #333; margin-bottom: 5px; }
        input[type="range"] { width: 100%; height: 30px; cursor: pointer; }
        .hint { font-size: 12px; color: #666; background: #fdfdfd; padding: 10px; border: 1px solid #eee; border-radius: 5px; text-align: right; }
    </style>
</head>
<body>

<div class="container">
    <h3>ضبط الصورة (معيار العينين)</h3>
    
    <input type="file" id="upload" accept="image/*" style="display:none;">
    <button onclick="document.getElementById('upload').click()" class="btn btn-file">📸 اختر صورتك</button>

    <div id="canvas-wrap">
        <canvas id="canvas" width="480" height="640"></canvas>
        <div class="absher-guide"></div>
        <div class="eye-line"></div> </div>

    <div class="controls">
        <label style="font-size:14px; font-weight:bold;">تحكم في الحجم (Zoom):</label>
        <input type="range" id="zoom" min="0.05" max="3" step="0.01" value="1">
        
        <div class="hint">
            <strong>تعليمات أبشر:</strong><br>
            1. اسحب الصورة واجعل **العينين** فوق الخط الأخضر تماماً.<br>
            2. تأكد أن قمة الرأس والذقن داخل الإطار البيضاوي.<br>
            3. لا تترك مسافات كبيرة فوق الرأس.
        </div>

        <button id="downloadBtn" class="btn">حفظ الصورة بجودة 480x640 ✅</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const upload = document.getElementById('upload');
    const zoomSlider = document.getElementById('zoom');
    const downloadBtn = document.getElementById('downloadBtn');

    let img = new Image();
    let state = { x: 0, y: 0, scale: 1, isDragging: false, lastX: 0, lastY: 0 };

    upload.onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (f) => {
            img.onload = () => {
                state.scale = Math.max(canvas.width / img.width, canvas.height / img.height);
                state.x = (canvas.width - img.width * state.scale) / 2;
                state.y = (canvas.height - img.height * state.scale) / 2;
                zoomSlider.value = state.scale;
                draw();
            };
            img.src = f.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function draw() {
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        if (img.src) {
            ctx.drawImage(img, state.x, state.y, img.width * state.scale, img.height * state.scale);
        }
    }

    const handleStart = (e) => {
        state.isDragging = true;
        const pos = e.touches ? e.touches[0] : e;
        state.lastX = pos.clientX;
        state.lastY = pos.clientY;
    };

    const handleMove = (e) => {
        if (!state.isDragging) return;
        if (e.touches) e.preventDefault();
        const pos = e.touches ? e.touches[0] : e;
        
        // تحريك الصورة بنسبة وتناسب مع حجم الكانفاس الحقيقي
        const dx = (pos.clientX - state.lastX) * 1.6;
        const dy = (pos.clientY - state.lastY) * 1.6;
        
        state.x += dx;
        state.y += dy;
        state.lastX = pos.clientX;
        state.lastY = pos.clientY;
        draw();
    };

    const handleEnd = () => { state.isDragging = false; };

    canvas.addEventListener('mousedown', handleStart);
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('mouseup', handleEnd);

    canvas.addEventListener('touchstart', handleStart, { passive: false });
    canvas.addEventListener('touchmove', handleMove, { passive: false });
    canvas.addEventListener('touchend', handleEnd);

    zoomSlider.oninput = () => {
        const oldScale = state.scale;
        state.scale = parseFloat(zoomSlider.value);
        state.x -= (img.width * state.scale - img.width * oldScale) / 2;
        state.y -= (img.height * state.scale - img.height * oldScale) / 2;
        draw();
    };

    downloadBtn.onclick = () => {
        const link = document.createElement('a');
        link.download = 'Absher_Identity_Photo.jpg';
        link.href = canvas.toDataURL('image/jpeg', 0.98);
        link.click();
    };
</script>

</body>
</html>
