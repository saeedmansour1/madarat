<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>معالج أبشر -مدارت للأنظمة المحدودة - S&M</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; background: #2c3e50; margin: 0; padding: 10px; color: #fff; }
        .container { max-width: 420px; margin: auto; background: #ffffff; padding: 15px; border-radius: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); color: #333; }
        h3 { color: #1e5631; margin-bottom: 5px; font-size: 1.2rem; }
        
        #canvas-wrap { 
            position: relative; width: 300px; height: 400px; 
            margin: 10px auto; border: 4px solid #1e5631; 
            background: #fff; overflow: hidden; border-radius: 12px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }
        canvas { display: block; width: 100%; height: 100%; touch-action: none; }
        
        /*  */
        .guide-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .grid-v { position: absolute; left: 50%; top: 0; width: 1.5px; height: 100%; background: rgba(30, 86, 49, 0.5); }
        .eye-line { position: absolute; top: 42%; left: 0; width: 100%; height: 2px; background: rgba(0, 255, 0, 0.6); }
        .head-limit { position: absolute; top: 12%; left: 0; width: 100%; height: 1px; border-top: 2px dotted red; }
        .shoulder-curve { position: absolute; bottom: 12%; left: 5%; width: 90%; height: 80px; border: 2.5px solid rgba(30, 86, 49, 0.2); border-bottom: 0; border-radius: 60px 60px 0 0; }
        .face-oval { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(ellipse 115px 160px at 50% 45%, transparent 100%, rgba(255,255,255,0.82) 100%);
        }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .control-item { text-align: right; }
        label { font-size: 11px; font-weight: bold; color: #2c3e50; }
        input[type="range"] { width: 100%; height: 20px; accent-color: #1e5631; cursor: pointer; }
        
        .btn { grid-column: span 2; background: #1e5631; color: white; border: none; padding: 14px; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn:active { transform: scale(0.98); }
        .btn-file { background: #ecf0f1; color: #2c3e50; grid-column: span 2; margin-bottom: 5px; }
        .hint { grid-column: span 2; font-size: 10px; color: #7f8c8d; background: #fef9e7; padding: 8px; border-radius: 8px; border: 1px solid #f39c12; }
    </style>
</head>
<body>

<div class="container">
    <h3>مُعالج أبشر (مدارات للأنظمة المحدودة ) 🏆</h3>
    
    <input type="file" id="upload" accept="image/*" style="display:none;">
    <button onclick="document.getElementById('upload').click()" class="btn btn-file">📂 ارفع صورتك الشخصية</button>

    <div id="canvas-wrap">
        <canvas id="canvas" width="480" height="640"></canvas>
        <div class="guide-layer">
            <div class="face-oval"></div>
            <div class="grid-v"></div> <div class="eye-line"></div> <div class="head-limit"></div> <div class="shoulder-curve"></div> </div>
    </div>

    <div class="controls">
        <div class="control-item"><label>التكبير (Zoom)</label><input type="range" id="zoom" min="0.1" max="3" step="0.01" value="1"></div>
        <div class="control-item"><label>التدوير (Rotate)</label><input type="range" id="rotate" min="-25" max="25" step="0.2" value="0"></div>
        <div class="control-item"><label>إضاءة (Bright)</label><input type="range" id="bright" min="80" max="140" value="100"></div>
        <div class="control-item"><label>وضوح (Contrast)</label><input type="range" id="contrast" min="80" max="130" value="100"></div>
        
        <div class="hint">
            ✅ **للقبول الفوري:** اجعل قمة الرأس تلامس (الخط الأحمر المنقط)، والعينين على (الخط الأخضر)، والأنف على (الخط العمودي).
        </div>

        <button id="downloadBtn" class="btn">تحميل الصورة النهائية 480x640 ✅</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const upload = document.getElementById('upload');
    const downloadBtn = document.getElementById('downloadBtn');
    
    const sliders = ['zoom', 'bright', 'contrast', 'rotate'];
    const ctrl = {};
    sliders.forEach(s => ctrl[s] = document.getElementById(s));

    let img = new Image();
    let state = { x: 0, y: 0, scale: 1, isDragging: false, lastX: 0, lastY: 0 };

    upload.onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (f) => {
            img.onload = () => {
                state.scale = Math.max(canvas.width / img.width, canvas.height / img.height);
                state.x = canvas.width / 2;
                state.y = canvas.height / 2;
                ctrl.zoom.value = state.scale;
                draw();
            };
            img.src = f.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function draw() {
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "white"; //
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.translate(state.x, state.y);
        ctx.rotate(ctrl.rotate.value * Math.PI / 180);
        
        // 
        ctx.filter = `brightness(${ctrl.bright.value}%) contrast(${ctrl.contrast.value}%)`;
        
        if (img.src) {
            ctx.drawImage(img, -img.width * state.scale / 2, -img.height * state.scale / 2, img.width * state.scale, img.height * state.scale);
        }
        ctx.restore();
    }

    // 
    sliders.forEach(s => ctrl[s].oninput = () => {
        if (s === 'zoom') state.scale = parseFloat(ctrl.zoom.value);
        draw();
    });

    // 
    const start = (e) => { state.isDragging = true; const p = e.touches ? e.touches[0] : e; state.lastX = p.clientX; state.lastY = p.clientY; };
    const move = (e) => {
        if (!state.isDragging) return;
        if (e.touches) e.preventDefault();
        const p = e.touches ? e.touches[0] : e;
        state.x += (p.clientX - state.lastX) * 1.8;
        state.y += (p.clientY - state.lastY) * 1.8;
        state.lastX = p.clientX; state.lastY = p.clientY;
        draw();
    };
    const end = () => state.isDragging = false;

    canvas.addEventListener('mousedown', start); window.addEventListener('mousemove', move); window.addEventListener('mouseup', end);
    canvas.addEventListener('touchstart', start, {passive:false}); canvas.addEventListener('touchmove', move, {passive:false}); canvas.addEventListener('touchend', end);

    downloadBtn.onclick = () => {
        const link = document.createElement('a');
        link.download = 'Absher_Identity_Master.jpg';
        // 
        link.href = canvas.toDataURL('image/jpeg', 0.95);
        link.click();
    };
</script>

</body>
</html>
